<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5252"/>
      <stop offset="50%" style="stop-color:#ff9100"/>
      <stop offset="100%" style="stop-color:#ffd740"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  
  <!-- Shield shape -->
  <path d="M50 15 L80 30 L80 55 L50 85 L20 55 L20 30 Z" 
        fill="url(#shield)" 
        opacity="0.95"/>
  
  <!-- Inner shield border -->
  <path d="M50 20 L75 33 L75 53 L50 80 L25 53 L25 33 Z" 
        fill="none" 
        stroke="#ff5252" 
        stroke-width="2"/>
  
  <!-- Lightning bolt (fraud detection = fast) -->
  <path d="M55 35 L45 50 L55 50 L45 65 L60 48 L50 48 L58 35 Z" 
        fill="#ff5252" 
        stroke="#d32f2f" 
        stroke-width="1"/>
  
  <!-- Small accent dots -->
  <circle cx="35" cy="40" r="2" fill="#ff5252" opacity="0.6"/>
  <circle cx="65" cy="40" r="2" fill="#ff5252" opacity="0.6"/>
  <circle cx="50" cy="72" r="2" fill="#ff5252" opacity="0.6"/>
  
  <!-- FE text -->
  <text x="50" y="92" 
        font-family="monospace" 
        font-size="14" 
        font-weight="bold" 
        fill="#fff" 
        text-anchor="middle" 
        opacity="0.9">FE</text>
</svg>
